name: promptforge
version: "1.0.0"
description: >
  PromptForge — OpenEnv-compliant RL environment for training agents to detect
  and eliminate Prompt Debt from production LLM system prompts. Built on the
  official openenv-core library. Based on the PromptDebt taxonomy (Aljohani
  et al. 2025) and Arbiter AST interference detection (arXiv 2026).
author: "raunaqmittal"
tags:
  - openenv
  - llmops
  - prompt-engineering
  - reinforcement-learning
  - ast
  - nlp

framework: openenv-core==0.2.3

tasks:
  - id: task_few_shot_debt
    name: "Few-Shot Debt Eradication"
    difficulty: easy
    max_steps: 20
    start_action:
      action_type: "START_EPISODE"
      task_difficulty: "easy"

  - id: task_mandate_conflict
    name: "Mandate-Prohibition Conflict Resolution"
    difficulty: medium
    max_steps: 20
    start_action:
      action_type: "START_EPISODE"
      task_difficulty: "medium"

  - id: task_schema_archaeology
    name: "Multi-Tool Schema Archaeology"
    difficulty: hard
    max_steps: 20
    start_action:
      action_type: "START_EPISODE"
      task_difficulty: "hard"

observation_space: models.PromptForgeObservation
action_space: models.PromptForgeAction
reward_range: [-0.5, 1.0]

transport:
  - type: http
    paths:
      reset: /reset
      step: /step
      state: /state
      health: /health
  - type: websocket
    path: /ws

endpoint: "https://raunaqmittal2004-promptforge.hf.space"
